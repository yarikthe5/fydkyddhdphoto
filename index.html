<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f2f2f2;
}

.wrap{
    max-width:500px;
    margin:auto;
    padding:12px;
}

.block{
    background:white;
    padding:12px;
    border-radius:12px;
    margin-bottom:12px;
}

input,select{
    width:100%;
    padding:14px;
    margin:6px 0;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ddd;
}

img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="block">
<input type="file" id="imageInput">

<input type="text" id="topText" placeholder="Верхній текст">
<input type="text" id="bottomText" placeholder="Нижній текст">

<label>Розмір верхнього тексту</label>
<input type="range" id="topSize" min="40" max="140" value="90">

<label>Розмір нижнього тексту</label>
<input type="range" id="bottomSize" min="30" max="120" value="70">

<label>Кількість рядків</label>
<input type="range" id="lines" min="1" max="3" value="2">

<label>Ефект</label>
<select id="effect">
<option value="none">Без</option>
<option value="pixel">Pixel</option>
<option value="blur">Blur</option>
</select>

<label>Сила ефекту</label>
<input type="range" id="strength" min="2" max="30" value="8">
</div>

<div class="block">
<h3>Фото</h3>
<img id="img1">
<button onclick="download('img1')">Зберегти</button>

<h3>Фото з ефектом</h3>
<img id="img2">
<button onclick="download('img2')">Зберегти</button>
</div>

</div>

<script>
let img = null;

const canvas = document.createElement("canvas");
canvas.width = 1080;
canvas.height = 1080;
const ctx = canvas.getContext("2d");

/* завантаження */
document.getElementById("imageInput").onchange = e=>{
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = ev=>{
        img = new Image();
        img.onload = render;
        img.src = ev.target.result;
    };

    reader.readAsDataURL(file);
};

/* обновлення */
document.querySelectorAll("input,select").forEach(el=>{
    el.oninput = render;
});

/* перенос тексту */
function wrapText(ctx,text,maxLines){
    let words = text.split(" ");
    let lines = [""];
    
    words.forEach(word=>{
        let last = lines[lines.length-1];
        lines[lines.length-1] = last + " " + word;

        if(lines.length < maxLines && ctx.measureText(lines[lines.length-1]).width > 900){
            lines.push(word);
        }
    });

    return lines.slice(0,maxLines);
}

function render(){
    ctx.clearRect(0,0,1080,1080);

    ctx.fillStyle="white";
    ctx.fillRect(0,0,1080,1080);

    const topSize = document.getElementById("topSize").value;
    const bottomSize = document.getElementById("bottomSize").value;

    ctx.textAlign="center";

    /* верхній текст */
    ctx.font = `bold ${topSize}px Arial`;

    let lines = wrapText(
        ctx,
        document.getElementById("topText").value.toUpperCase(),
        document.getElementById("lines").value
    );

    let y = 120;

    lines.forEach(line=>{
        ctx.fillStyle="black";
        ctx.fillText(line,540,y);
        y += topSize + 10;
    });

    /* фото */
    if(img){
        ctx.drawImage(img,0,y,1080,1080-y);
    }

    /* нижній текст */
    const bottom = document.getElementById("bottomText").value.toUpperCase();

    if(bottom){
        ctx.font = `bold ${bottomSize}px Arial`;
        ctx.fillText(bottom,540,1000);
    }

    /* 1 фото */
    document.getElementById("img1").src = canvas.toDataURL();

    /* 2 фото */
    applyEffect();
}

function applyEffect(){
    const effect = document.getElementById("effect").value;
    const strength = document.getElementById("strength").value;

    const c = document.createElement("canvas");
    c.width = 1080;
    c.height = 1080;

    const cx = c.getContext("2d");

    if(effect === "blur"){
        cx.filter = `blur(${strength}px)`;
        cx.drawImage(canvas,0,0);
        cx.filter = "none";
    } else {
        cx.drawImage(canvas,0,0);
    }

    if(effect === "pixel"){
        let temp = document.createElement("canvas");
        temp.width = c.width / strength;
        temp.height = c.height / strength;

        let t = temp.getContext("2d");
        t.drawImage(c,0,0,temp.width,temp.height);

        cx.imageSmoothingEnabled = false;
        cx.drawImage(temp,0,0,c.width,c.height);
    }

    document.getElementById("img2").src = c.toDataURL();
}

/* скачування */
function download(id){
    const a = document.createElement("a");
    a.href = document.getElementById(id).src;
    a.download = "image.png";
    a.click();
}

/* старт */
render();
</script>

</body>
</html>
