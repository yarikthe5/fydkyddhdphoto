<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Angel Core Editor</title>

<style>
body{
    margin:0;
    font-family: -apple-system, Arial;
    background: radial-gradient(circle at top,#ffffff,#eaeaf0);
}

/* glass cards */
.card{
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.6);
    border-radius:20px;
    padding:16px;
    margin:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

.container{
    max-width:900px;
    margin:auto;
}

/* inputs */
input,select{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:1px solid rgba(0,0,0,0.1);
    background:rgba(255,255,255,0.7);
    margin:6px 0;
}

/* preview */
.preview{
    width:100%;
    border-radius:16px;
    margin-top:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* glow title */
h2{
    text-align:center;
    font-weight:600;
    text-shadow:0 0 10px rgba(255,255,255,0.9);
}
</style>
</head>

<body>

<div class="container">

<h2>Angel Core Editor ✨</h2>

<div class="card">

<input type="file" id="imageInput">

<input type="text" id="topText" placeholder="Верхній текст">
<input type="text" id="bottomText" placeholder="Нижній текст">

<label>Рядки</label>
<input type="range" id="lines" min="1" max="4" value="2">

<label>Шрифт</label>
<select id="font">
<option>Arial</option>
<option>Impact</option>
<option>Georgia</option>
</select>

<label>Колір тексту</label>
<input type="color" id="color" value="#000000">

<label>Обводка</label>
<input type="color" id="strokeColor" value="#ffffff">

<label>Товщина</label>
<input type="range" id="strokeWidth" min="0" max="20" value="6">

<label>Ефект</label>
<select id="effect">
<option value="pixel">Pixel</option>
<option value="blur">Blur</option>
</select>

<label>Сила</label>
<input type="range" id="effectStrength" min="2" max="50" value="10">

</div>

<div class="card">
<h3>Оригінал</h3>
<img id="img1" class="preview">

<h3>З ефектом</h3>
<img id="img2" class="preview">
</div>

</div>

<script>
let baseCanvas = document.createElement("canvas");
baseCanvas.width = 1080;
baseCanvas.height = 1080;

let ctx = baseCanvas.getContext("2d");

let img=null;

document.getElementById("imageInput").onchange=e=>{
    const reader=new FileReader();
    reader.onload=ev=>{
        img=new Image();
        img.onload=render;
        img.src=ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

document.querySelectorAll("input,select").forEach(el=>{
    el.oninput=render;
});

function wrap(ctx,text,maxLines){
    let words=text.split(" ");
    let lines=[""];

    words.forEach(word=>{
        let last=lines[lines.length-1];
        lines[lines.length-1]=last+" "+word;

        if(lines.length<maxLines && ctx.measureText(lines[lines.length-1]).width>800){
            lines.push(word);
        }
    });

    return lines.slice(0,maxLines);
}

function render(){
    ctx.clearRect(0,0,1080,1080);

    ctx.fillStyle="white";
    ctx.fillRect(0,0,1080,1080);

    const font=document.getElementById("font").value;
    ctx.font=`bold 100px ${font}`;
    ctx.textAlign="center";

    let lines=wrap(ctx,
        document.getElementById("topText").value.toUpperCase(),
        document.getElementById("lines").value
    );

    let y=100;

    lines.forEach(line=>{
        ctx.lineWidth=document.getElementById("strokeWidth").value;
        ctx.strokeStyle=document.getElementById("strokeColor").value;
        ctx.strokeText(line,540,y);

        ctx.fillStyle=document.getElementById("color").value;
        ctx.fillText(line,540,y);

        y+=110;
    });

    if(img){
        ctx.drawImage(img,0,y,1080,1080-y);
    }

    const bottom=document.getElementById("bottomText").value.toUpperCase();

    if(bottom){
        ctx.font=`bold 80px ${font}`;
        ctx.strokeText(bottom,540,1000);
        ctx.fillText(bottom,540,1000);
    }

    // 👉 перше фото
    document.getElementById("img1").src = baseCanvas.toDataURL();

    // 👉 друге фото з ефектом
    applyEffect();
}

function applyEffect(){
    const canvas=document.createElement("canvas");
    canvas.width=1080;
    canvas.height=1080;

    const c=canvas.getContext("2d");
    c.drawImage(baseCanvas,0,0);

    const effect=document.getElementById("effect").value;
    const strength=document.getElementById("effectStrength").value;

    if(effect==="pixel"){
        let temp=document.createElement("canvas");
        temp.width=canvas.width/strength;
        temp.height=canvas.height/strength;

        let t=temp.getContext("2d");
        t.drawImage(canvas,0,0,temp.width,temp.height);

        c.imageSmoothingEnabled=false;
        c.drawImage(temp,0,0,canvas.width,canvas.height);
    }

    if(effect==="blur"){
        c.filter=`blur(${strength}px)`;
        c.drawImage(canvas,0,0);
        c.filter="none";
    }

    document.getElementById("img2").src = canvas.toDataURL();
}

render();
</script>

</body>
</html>
