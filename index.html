<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photo Editor</title>

<!-- нормальні шрифти -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Oswald:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    max-width:900px;
    margin:auto;
    padding:12px;
}

.card{
    background:white;
    padding:14px;
    border-radius:12px;
    margin-bottom:12px;
}

input,select,button{
    width:100%;
    padding:12px;
    margin:6px 0;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    background:black;
    color:white;
}

canvas{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<input type="file" id="imageInput">

<input type="text" id="topText" placeholder="Верхній текст">
<input type="text" id="bottomText" placeholder="Нижній текст">

<label>Шрифт</label>
<select id="font">
<option value="Arial">Arial</option>
<option value="Impact">Impact</option>
<option value="Montserrat">Montserrat</option>
<option value="Oswald">Oswald</option>
</select>

<label>Розмір тексту</label>
<input type="range" id="fontSize" min="40" max="150" value="90">

<label>Кількість рядків</label>
<input type="range" id="lines" min="1" max="3" value="2">

<label>Ефект</label>
<select id="effect">
<option value="none">Без ефекту</option>
<option value="pixel">Pixel</option>
<option value="blur">Blur</option>
</select>

<label>Сила ефекту</label>
<input type="range" id="effectStrength" min="2" max="40" value="10">

</div>

<div class="card">
<h3>Фото 1</h3>
<img id="img1">

<button onclick="downloadImage('img1')">Зберегти фото 1</button>

<h3>Фото 2 (з ефектом)</h3>
<img id="img2">

<button onclick="downloadImage('img2')">Зберегти фото 2</button>
</div>

</div>

<script>
let baseCanvas = document.createElement("canvas");
baseCanvas.width = 1080;
baseCanvas.height = 1080;

let ctx = baseCanvas.getContext("2d");

let img = null;

document.getElementById("imageInput").onchange = e=>{
    const reader = new FileReader();
    reader.onload = ev=>{
        img = new Image();
        img.onload = render;
        img.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

document.querySelectorAll("input,select").forEach(el=>{
    el.oninput = render;
});

function wrap(ctx,text,maxLines){
    let words = text.split(" ");
    let lines = [""];
    
    words.forEach(word=>{
        let last = lines[lines.length-1];
        lines[lines.length-1] = last + " " + word;

        if(lines.length < maxLines && ctx.measureText(lines[lines.length-1]).width > 900){
            lines.push(word);
        }
    });

    return lines.slice(0,maxLines);
}

function render(){
    ctx.clearRect(0,0,1080,1080);

    ctx.fillStyle = "white";
    ctx.fillRect(0,0,1080,1080);

    const font = document.getElementById("font").value;
    const size = document.getElementById("fontSize").value;

    ctx.font = `bold ${size}px ${font}`;
    ctx.textAlign = "center";

    let lines = wrap(ctx,
        document.getElementById("topText").value.toUpperCase(),
        document.getElementById("lines").value
    );

    let y = 100;

    lines.forEach(line=>{
        ctx.fillStyle = "black";
        ctx.fillText(line,540,y);
        y += size + 10;
    });

    if(img){
        ctx.drawImage(img,0,y,1080,1080-y);
    }

    const bottom = document.getElementById("bottomText").value.toUpperCase();

    if(bottom){
        ctx.font = `bold ${size-20}px ${font}`;
        ctx.fillText(bottom,540,1000);
    }

    document.getElementById("img1").src = baseCanvas.toDataURL();

    applyEffect();
}

function applyEffect(){
    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1080;

    const c = canvas.getContext("2d");
    c.drawImage(baseCanvas,0,0);

    const effect = document.getElementById("effect").value;
    const strength = document.getElementById("effectStrength").value;

    if(effect === "pixel"){
        let temp = document.createElement("canvas");
        temp.width = canvas.width / strength;
        temp.height = canvas.height / strength;

        let t = temp.getContext("2d");
        t.drawImage(canvas,0,0,temp.width,temp.height);

        c.imageSmoothingEnabled = false;
        c.drawImage(temp,0,0,canvas.width,canvas.height);
    }

    if(effect === "blur"){
        c.filter = `blur(${strength}px)`;
        c.drawImage(canvas,0,0);
        c.filter = "none";
    }

    document.getElementById("img2").src = canvas.toDataURL();
}

function downloadImage(id){
    const link = document.createElement("a");
    link.href = document.getElementById(id).src;
    link.download = "image.png";
    link.click();
}

render();
</script>

</body>
</html>
