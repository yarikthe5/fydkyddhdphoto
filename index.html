<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel Editor</title>

<style>
body{
    margin:0;
    font-family: "Arial";
    background: linear-gradient(180deg,#ffffff,#f3f3f3);
    color:#111;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:16px;
}

.card{
    background:white;
    padding:16px;
    border-radius:16px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
    margin-bottom:16px;
}

input,select{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

label{
    font-size:13px;
}

canvas{
    width:100%;
    border-radius:12px;
    margin-top:10px;
}

/* важливо для айфона */
img.export{
    width:100%;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h2>Angel Editor ✨</h2>

<div class="card">

<input type="file" id="imageInput">

<input type="text" id="topText" placeholder="Верхній текст">
<input type="text" id="bottomText" placeholder="Нижній текст">

<label>Кількість рядків</label>
<input type="range" id="lines" min="1" max="4" value="2">

<label>Шрифт</label>
<select id="font">
<option>Arial</option>
<option>Impact</option>
<option>Georgia</option>
<option>Courier New</option>
</select>

<label>Колір тексту</label>
<input type="color" id="color" value="#000000">

<label>Обводка</label>
<input type="color" id="strokeColor" value="#ffffff">

<label>Товщина обводки</label>
<input type="range" id="strokeWidth" min="0" max="20" value="6">

<label>Ефект</label>
<select id="effect">
<option value="pixel">Pixel</option>
<option value="blur">Blur</option>
</select>

<label>Сила ефекту</label>
<input type="range" id="effectStrength" min="2" max="50" value="10">

</div>

<div class="card">
<canvas id="canvas" width="1080" height="1080"></canvas>

<!-- тут img для айфона -->
<img id="resultImage" class="export">
</div>

</div>

<script>
let img = null;

document.getElementById("imageInput").onchange = e=>{
    const reader = new FileReader();
    reader.onload = ev=>{
        img = new Image();
        img.onload = render;
        img.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

document.querySelectorAll("input,select").forEach(el=>{
    el.oninput = render;
});

function splitLines(ctx,text,maxLines){
    let words = text.split(" ");
    let lines = [""];

    words.forEach(word=>{
        let last = lines[lines.length-1];
        lines[lines.length-1] = last + " " + word;

        if(lines.length < maxLines && ctx.measureText(lines[lines.length-1]).width > 800){
            lines.push(word);
        }
    });

    return lines.slice(0,maxLines);
}

function render(){
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,1080,1080);
    ctx.fillStyle="white";
    ctx.fillRect(0,0,1080,1080);

    const font = document.getElementById("font").value;
    const size = 100;
    ctx.font = `bold ${size}px ${font}`;

    const linesCount = parseInt(document.getElementById("lines").value);
    const topText = document.getElementById("topText").value.toUpperCase();

    let lines = splitLines(ctx,topText,linesCount);

    let y = 100;

    ctx.textAlign="center";

    lines.forEach(line=>{
        ctx.strokeStyle=document.getElementById("strokeColor").value;
        ctx.lineWidth=document.getElementById("strokeWidth").value;

        ctx.strokeText(line,540,y);

        ctx.fillStyle=document.getElementById("color").value;
        ctx.fillText(line,540,y);

        y+=110;
    });

    if(img){
        ctx.drawImage(img,0,y,1080,1080-y);
    }

    const bottom = document.getElementById("bottomText").value.toUpperCase();

    if(bottom){
        ctx.font=`bold 80px ${font}`;

        ctx.strokeText(bottom,540,1000);
        ctx.fillText(bottom,540,1000);
    }

    applyEffect(ctx);

    // 👉 генеруємо img (для айфона)
    document.getElementById("resultImage").src = canvas.toDataURL();
}

function applyEffect(ctx){
    const effect = document.getElementById("effect").value;
    const strength = parseInt(document.getElementById("effectStrength").value);

    const canvas = ctx.canvas;

    if(effect==="pixel"){
        const temp = document.createElement("canvas");
        temp.width = canvas.width/strength;
        temp.height = canvas.height/strength;

        const t = temp.getContext("2d");
        t.drawImage(canvas,0,0,temp.width,temp.height);

        ctx.imageSmoothingEnabled=false;
        ctx.drawImage(temp,0,0,canvas.width,canvas.height);
    }

    if(effect==="blur"){
        ctx.filter = `blur(${strength}px)`;
        ctx.drawImage(canvas,0,0);
        ctx.filter="none";
    }
}

render();
</script>

</body>
</html>
