<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f6f6f6;
    color:#111;
}

.wrap{
    max-width:520px;
    margin:auto;
    padding:12px;
}

/* прості картки */
.block{
    background:#fff;
    padding:12px;
    border-radius:14px;
    margin-bottom:10px;
    border:1px solid #e6e6e6;
}

/* інпути */
input,select{
    width:100%;
    padding:14px;
    margin:6px 0;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ddd;
    outline:none;
}

/* кнопки */
button{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:none;
    border-radius:12px;
    background:#111;
    color:white;
    font-size:16px;
}

/* картинки */
img{
    width:100%;
    border-radius:12px;
    margin-top:10px;
}

/* sticky export */
.export-bar{
    position:sticky;
    bottom:0;
    background:#fff;
    padding:10px;
    border-top:1px solid #ddd;
    display:flex;
    gap:10px;
}

/* заголовки */
h3{
    margin:6px 0;
    font-size:16px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="block">
<input type="file" id="imageInput" accept="image/*">

<input type="text" id="topText" placeholder="Верхній текст">
<input type="text" id="bottomText" placeholder="Нижній текст">

<label>Верхній текст</label>
<input type="range" id="topSize" min="40" max="140" value="90">

<label>Нижній текст</label>
<input type="range" id="bottomSize" min="30" max="120" value="70">

<label>Ефект</label>
<select id="effect">
<option value="none">Без</option>
<option value="pixel">Pixel</option>
<option value="blur">Blur</option>
</select>

<label>Сила</label>
<input type="range" id="strength" min="2" max="30" value="8">
</div>

<div class="block">
<h3>Оригінал</h3>
<img id="img1">

<h3>З ефектом</h3>
<img id="img2">
</div>

<div class="export-bar">
<button onclick="download('img1')">Оригінал</button>
<button onclick="download('img2')">Ефект</button>
</div>

</div>

<script>
let img = null;
let loaded = false;

const canvas = document.createElement("canvas");
canvas.width = 1080;
canvas.height = 1080;
const ctx = canvas.getContext("2d");

/* upload */
document.getElementById("imageInput").addEventListener("change", e=>{
    const file = e.target.files[0];
    if(!file) return;

    const url = URL.createObjectURL(file);

    img = new Image();
    img.onload = ()=>{
        loaded = true;
        render();
    };
    img.src = url;
});

/* live update */
document.querySelectorAll("input,select").forEach(el=>{
    el.addEventListener("input", render);
});

/* render */
function render(){
    ctx.clearRect(0,0,1080,1080);

    const topSize = +document.getElementById("topSize").value;
    const bottomSize = +document.getElementById("bottomSize").value;

    const topText = document.getElementById("topText").value.toUpperCase();
    const bottomText = document.getElementById("bottomText").value.toUpperCase();

    /* top */
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,1080,200);

    ctx.font = `bold ${topSize}px Arial`;
    ctx.textAlign = "center";
    ctx.fillStyle = "black";
    ctx.fillText(topText,540,120);

    /* image */
    if(loaded && img){
        ctx.drawImage(img,0,200,1080,880);
    }

    /* bottom text */
    if(bottomText){
        ctx.font = `bold ${bottomSize}px Arial`;
        ctx.textAlign = "center";

        ctx.lineWidth = 8;
        ctx.strokeStyle = "black";
        ctx.strokeText(bottomText,540,1000);

        ctx.fillStyle = "white";
        ctx.fillText(bottomText,540,1000);
    }

    document.getElementById("img1").src = canvas.toDataURL();
    applyEffect();
}

/* effects */
function applyEffect(){
    const effect = document.getElementById("effect").value;
    const strength = +document.getElementById("strength").value;

    const c = document.createElement("canvas");
    c.width = 1080;
    c.height = 1080;

    const cx = c.getContext("2d");

    if(effect === "blur"){
        cx.filter = `blur(${strength}px)`;
        cx.drawImage(canvas,0,0);
        cx.filter = "none";
    }
    else if(effect === "pixel"){
        let temp = document.createElement("canvas");
        temp.width = 1080 / strength;
        temp.height = 1080 / strength;

        let t = temp.getContext("2d");
        t.drawImage(canvas,0,0,temp.width,temp.height);

        cx.imageSmoothingEnabled = false;
        cx.drawImage(temp,0,0,1080,1080);
    }
    else{
        cx.drawImage(canvas,0,0);
    }

    document.getElementById("img2").src = c.toDataURL();
}

/* download */
function download(id){
    const a = document.createElement("a");
    a.href = document.getElementById(id).src;
    a.download = "image.png";
    a.click();
}

render();
</script>

</body>
</html>
