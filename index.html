<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Editor</title>
<style>
body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 0 auto;
    padding: 16px;
    background: #fafafa;
}
h1,h2{
    margin: 8px 0;
}
.section{
    background: white;
    padding: 16px;
    border-radius: 14px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.controls{
    position: sticky;
    top: 0;
    z-index: 10;
    background: white;
    padding: 16px;
    border-radius: 14px;
}
input[type="text"],
input[type="file"]{
    width: 100%;
    box-sizing: border-box;
    padding: 12px;
    margin-bottom: 12px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 10px;
}
input[type="range"]{
    width: 100%;
    margin-bottom: 14px;
}
button{
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #111;
    color: white;
    margin-top: 8px;
}
canvas{
    width: 100%;
    height: auto;
    border-radius: 10px;
    border: 1px solid #ddd;
}
.open-buttons{
    display:flex;
    gap:10px;
    margin-top:10px;
}
.open-buttons button{
    flex:1;
}
</style>
</head>
<body>

<h1>Редактор фото 🔥</h1>

<div class="section controls">
    <input type="file" id="imageInput" accept="image/*">
    <input type="text" id="textInput" placeholder="Верхній текст">
    <input type="text" id="bottomTextInput" placeholder="Нижній текст">

    <label>Ширина верхнього тексту:
        <span id="textWidthValue">1000</span>
    </label>
    <input type="range" id="textWidth" min="300" max="1080" value="1000">

    <label>Розмір верхнього тексту:
        <span id="fontSizeValue">110</span>
    </label>
    <input type="range" id="fontSize" min="40" max="200" value="110">

    <label>Розмір нижнього тексту:
        <span id="bottomFontSizeValue">80</span>
    </label>
    <input type="range" id="bottomFontSize" min="30" max="150" value="80">

    <label>Пікселізація:
        <span id="pixelValue">20</span>
    </label>
    <input type="range" id="pixelSize" min="5" max="80" value="20">
</div>

<div class="section">
    <h2>Перше фото</h2>
    <canvas id="canvas1" width="1080" height="1080"></canvas>
</div>

<div class="section">
    <h2>Піксельне фото</h2>
    <canvas id="canvas2" width="1080" height="1080"></canvas>

    <div class="open-buttons">
        <button onclick="openImage('canvas1')">Відкрити 1 фото</button>
        <button onclick="openImage('canvas2')">Відкрити 2 фото</button>
    </div>
</div>

<script>
let uploadedImage = null;

const controls = [
    "textInput",
    "bottomTextInput",
    "textWidth",
    "fontSize",
    "bottomFontSize",
    "pixelSize"
];

document.getElementById("imageInput").addEventListener("change", e=>{
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = ev=>{
        uploadedImage = new Image();
        uploadedImage.onload = generateImages;
        uploadedImage.src = ev.target.result;
    };

    reader.readAsDataURL(file);
});

controls.forEach(id=>{
    document.getElementById(id).addEventListener("input", ()=>{
        updateLabels();
        generateImages();
    });
});

function updateLabels(){
    document.getElementById("textWidthValue").textContent =
        document.getElementById("textWidth").value;

    document.getElementById("fontSizeValue").textContent =
        document.getElementById("fontSize").value;

    document.getElementById("bottomFontSizeValue").textContent =
        document.getElementById("bottomFontSize").value;

    document.getElementById("pixelValue").textContent =
        document.getElementById("pixelSize").value;
}

function wrapText(ctx, text, maxWidth){
    const words = text.toUpperCase().split(" ");
    let lines = [];
    let line = "";

    for(let word of words){
        const test = line + word + " ";

        if(ctx.measureText(test).width > maxWidth && line){
            lines.push(line.trim());
            line = word + " ";
        } else {
            line = test;
        }
    }

    lines.push(line.trim());

    if(lines.length > 2){
        lines = [lines[0], lines.slice(1).join(" ")];
    }

    return lines;
}

function drawNormal(ctx){
    const canvas = ctx.canvas;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const topText =
        document.getElementById("textInput").value;

    const bottomText =
        document.getElementById("bottomTextInput").value.toUpperCase();

    const maxWidth =
        parseInt(document.getElementById("textWidth").value);

    const fontSize =
        parseInt(document.getElementById("fontSize").value);

    const bottomFontSize =
        parseInt(document.getElementById("bottomFontSize").value);

    ctx.font = `bold ${fontSize}px Arial`;
    ctx.fillStyle = "black";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    const lines = wrapText(ctx, topText, maxWidth);

    const lineHeight = fontSize + 10;
    const whiteAreaHeight = lines.length * lineHeight + 100;

    const startY =
        whiteAreaHeight / 2 -
        ((lines.length - 1) * lineHeight) / 2;

    lines.forEach((line, i)=>{
        ctx.fillText(
            line,
            canvas.width / 2,
            startY + i * lineHeight
        );
    });

    if(uploadedImage){
        ctx.drawImage(
            uploadedImage,
            0,
            whiteAreaHeight,
            canvas.width,
            canvas.height - whiteAreaHeight
        );
    }

    if(bottomText){
        ctx.font = `bold ${bottomFontSize}px Arial`;

        ctx.lineWidth = 10;
        ctx.strokeStyle = "black";

        ctx.strokeText(
            bottomText,
            canvas.width / 2,
            canvas.height - 80
        );

        ctx.fillStyle = "white";

        ctx.fillText(
            bottomText,
            canvas.width / 2,
            canvas.height - 80
        );
    }
}

function pixelateWhole(sourceCanvas, targetCtx, size){
    const temp = document.createElement("canvas");

    temp.width = Math.floor(sourceCanvas.width / size);
    temp.height = Math.floor(sourceCanvas.height / size);

    const tctx = temp.getContext("2d");

    tctx.drawImage(
        sourceCanvas,
        0,
        0,
        temp.width,
        temp.height
    );

    targetCtx.clearRect(
        0,
        0,
        targetCtx.canvas.width,
        targetCtx.canvas.height
    );

    targetCtx.imageSmoothingEnabled = false;

    targetCtx.drawImage(
        temp,
        0,
        0,
        targetCtx.canvas.width,
        targetCtx.canvas.height
    );

    targetCtx.imageSmoothingEnabled = true;
}

function generateImages(){
    const ctx1 =
        document.getElementById("canvas1").getContext("2d");

    const ctx2 =
        document.getElementById("canvas2").getContext("2d");

    drawNormal(ctx1);

    const pixel =
        parseInt(document.getElementById("pixelSize").value);

    pixelateWhole(ctx1.canvas, ctx2, pixel);
}

function openImage(canvasId){
    const canvas = document.getElementById(canvasId);
    const imageUrl = canvas.toDataURL("image/png");

    const newWindow = window.open();

    newWindow.document.write(`
        <html>
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
                body{
                    margin:0;
                    display:flex;
                    justify-content:center;
                    align-items:center;
                    min-height:100vh;
                    background:black;
                }
                img{
                    max-width:100%;
                    height:auto;
                }
            </style>
        </head>
        <body>
            <img src="${imageUrl}">
        </body>
        </html>
    `);
}

updateLabels();
generateImages();
</script>

</body>
</html>
