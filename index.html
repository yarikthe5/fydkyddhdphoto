<!DOCTYPE html>
<html lang='uk'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Motivation Image Maker</title>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:20px auto;padding:20px}
canvas{border:1px solid #ccc;max-width:100%;margin:10px 0}
.controls{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
button{padding:10px 16px;font-size:16px}
</style>
</head>
<body>
<h1>Генератор мотиваційних фото</h1>
<div class='controls'>
<input type='file' id='imageInput' accept='image/*'>
<input type='text' id='textInput' placeholder='Введи текст зверху'>
<button onclick='generateImages()'>Згенерувати</button>
</div>
<h2>Звичайне 1:1 фото</h2>
<canvas id='canvas1' width='1080' height='1080'></canvas>
<a id='download1' download='normal.png'>Скачати 1:1</a>
<h2>Пікселізоване фото</h2>
<canvas id='canvas2' width='1080' height='1080'></canvas>
<a id='download2' download='pixelated.png'>Скачати піксель</a>
<script>
let uploadedImage=null;
document.getElementById('imageInput').addEventListener('change',e=>{
 const file=e.target.files[0];
 const reader=new FileReader();
 reader.onload=ev=>{
   uploadedImage=new Image();
   uploadedImage.src=ev.target.result;
 };
 reader.readAsDataURL(file);
});
function wrapText(ctx,text,x,y,maxWidth,lineHeight){
 const words=text.split(' ');
 let line='',lines=[];
 for(let i=0;i<words.length;i++){
   let test=line+words[i]+' ';
   if(ctx.measureText(test).width>maxWidth && i>0){lines.push(line);line=words[i]+' ';}
   else line=test;
 }
 lines.push(line);
 lines.forEach((l,i)=>ctx.fillText(l.trim(),x,y+i*lineHeight));
}
function drawBase(ctx,pixelate=false){
 const c=ctx.canvas;
 ctx.clearRect(0,0,c.width,c.height);
 ctx.fillStyle='white'; ctx.fillRect(0,0,c.width,c.height);
 const top=220, imgH=c.height-top;
 ctx.fillStyle='black'; ctx.textAlign='center'; ctx.font='bold 90px Arial';
 wrapText(ctx,document.getElementById('textInput').value.toUpperCase(),c.width/2,100,c.width-80,90);
 if(uploadedImage){
   if(pixelate){
     const temp=document.createElement('canvas');
     temp.width=60; temp.height=60;
     const t=temp.getContext('2d');
     t.drawImage(uploadedImage,0,0,temp.width,temp.height);
     ctx.imageSmoothingEnabled=false;
     ctx.drawImage(temp,0,top,c.width,imgH);
     ctx.imageSmoothingEnabled=true;
   } else {
     const ratio=Math.max(c.width/uploadedImage.width,imgH/uploadedImage.height);
     const w=uploadedImage.width*ratio, h=uploadedImage.height*ratio;
     ctx.drawImage(uploadedImage,(c.width-w)/2,top,w,h);
   }
 }
}
function generateImages(){
 const ctx1=document.getElementById('canvas1').getContext('2d');
 const ctx2=document.getElementById('canvas2').getContext('2d');
 drawBase(ctx1,false); drawBase(ctx2,true);
 document.getElementById('download1').href=ctx1.canvas.toDataURL();
 document.getElementById('download2').href=ctx2.canvas.toDataURL();
}
</script>
</body>
</html>
