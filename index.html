<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Editor Live</title>
<style>
body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 20px auto;
    padding: 20px;
    line-height: 1.4;
}
h1,h2{
    margin-bottom: 10px;
}
.section{
    background: #f5f5f5;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 20px;
}
.controls{
    display: flex;
    flex-direction: column;
    gap: 14px;
}
label{
    font-size: 14px;
}
input[type="text"]{
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
}
input[type="range"]{
    width: 100%;
}
button{
    padding: 12px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
.download-btn{
    margin-top: 8px;
}
canvas{
    border: 1px solid #ddd;
    max-width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>
<body>

<h1>Генератор TikTok фото 🔥</h1>

<div class="section">
<div class="controls">
    <input type="file" id="imageInput" accept="image/*">

    <input type="text" id="textInput" placeholder="Верхній текст">
    <input type="text" id="bottomTextInput" placeholder="Нижній текст">

    <label>
        Ширина верхнього тексту:
        <span id="textWidthValue">1000</span>
    </label>
    <input type="range" id="textWidth" min="300" max="1080" value="1000">

    <label>
        Розмір верхнього тексту:
        <span id="fontSizeValue">110</span>
    </label>
    <input type="range" id="fontSize" min="40" max="200" value="110">

    <label>
        Розмір нижнього тексту:
        <span id="bottomFontSizeValue">80</span>
    </label>
    <input type="range" id="bottomFontSize" min="30" max="150" value="80">

    <label>
        Пікселізація:
        <span id="pixelValue">20</span>
    </label>
    <input type="range" id="pixelSize" min="5" max="80" value="20">
</div>
</div>

<div class="section">
<h2>Звичайне фото</h2>
<canvas id="canvas1" width="1080" height="1080"></canvas>
<br>
<a id="download1" download="normal.png">
    <button class="download-btn">Скачати перше фото</button>
</a>
</div>

<div class="section">
<h2>Піксельне фото</h2>
<canvas id="canvas2" width="1080" height="1080"></canvas>
<br>
<a id="download2" download="pixelated.png">
    <button class="download-btn">Скачати піксельне фото</button>
</a>
</div>

<script>
let uploadedImage = null;

const controls = [
    "textInput",
    "bottomTextInput",
    "textWidth",
    "fontSize",
    "bottomFontSize",
    "pixelSize"
];

document.getElementById("imageInput").addEventListener("change", e=>{
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = ev=>{
        uploadedImage = new Image();
        uploadedImage.onload = generateImages;
        uploadedImage.src = ev.target.result;
    };

    reader.readAsDataURL(file);
});

controls.forEach(id=>{
    document.getElementById(id).addEventListener("input", ()=>{
        updateLabels();
        generateImages();
    });
});

function updateLabels(){
    document.getElementById("textWidthValue").textContent =
        document.getElementById("textWidth").value;

    document.getElementById("fontSizeValue").textContent =
        document.getElementById("fontSize").value;

    document.getElementById("bottomFontSizeValue").textContent =
        document.getElementById("bottomFontSize").value;

    document.getElementById("pixelValue").textContent =
        document.getElementById("pixelSize").value;
}

function wrapText(ctx, text, maxWidth){
    const words = text.toUpperCase().split(" ");
    let lines = [];
    let line = "";

    for(let word of words){
        const test = line + word + " ";

        if(ctx.measureText(test).width > maxWidth && line){
            lines.push(line.trim());
            line = word + " ";
        } else {
            line = test;
        }
    }

    lines.push(line.trim());

    if(lines.length > 2){
        lines = [lines[0], lines.slice(1).join(" ")];
    }

    return lines;
}

function drawNormal(ctx){
    const canvas = ctx.canvas;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const text = document.getElementById("textInput").value;
    const bottomText =
        document.getElementById("bottomTextInput").value.toUpperCase();

    const maxWidth =
        parseInt(document.getElementById("textWidth").value);

    const fontSize =
        parseInt(document.getElementById("fontSize").value);

    const bottomFontSize =
        parseInt(document.getElementById("bottomFontSize").value);

    ctx.font = `bold ${fontSize}px Arial`;
    ctx.fillStyle = "black";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    const lines = wrapText(ctx, text, maxWidth);

    const lineHeight = fontSize + 10;
    const whiteAreaHeight = lines.length * lineHeight + 100;

    const startY =
        whiteAreaHeight / 2 -
        ((lines.length - 1) * lineHeight) / 2;

    lines.forEach((line, i)=>{
        ctx.fillText(
            line,
            canvas.width / 2,
            startY + i * lineHeight
        );
    });

    if(uploadedImage){
        ctx.drawImage(
            uploadedImage,
            0,
            whiteAreaHeight,
            canvas.width,
            canvas.height - whiteAreaHeight
        );
    }

    if(bottomText){
        ctx.font = `bold ${bottomFontSize}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.lineWidth = 10;
        ctx.strokeStyle = "black";
        ctx.strokeText(
            bottomText,
            canvas.width / 2,
            canvas.height - 80
        );

        ctx.fillStyle = "white";
        ctx.fillText(
            bottomText,
            canvas.width / 2,
            canvas.height - 80
        );
    }
}

function pixelateWhole(sourceCanvas, targetCtx, size){
    const temp = document.createElement("canvas");

    temp.width = Math.floor(sourceCanvas.width / size);
    temp.height = Math.floor(sourceCanvas.height / size);

    const tctx = temp.getContext("2d");

    tctx.drawImage(
        sourceCanvas,
        0,
        0,
        temp.width,
        temp.height
    );

    targetCtx.clearRect(
        0,
        0,
        targetCtx.canvas.width,
        targetCtx.canvas.height
    );

    targetCtx.imageSmoothingEnabled = false;

    targetCtx.drawImage(
        temp,
        0,
        0,
        targetCtx.canvas.width,
        targetCtx.canvas.height
    );

    targetCtx.imageSmoothingEnabled = true;
}

function generateImages(){
    const ctx1 =
        document.getElementById("canvas1").getContext("2d");

    const ctx2 =
        document.getElementById("canvas2").getContext("2d");

    drawNormal(ctx1);

    const pixel =
        parseInt(document.getElementById("pixelSize").value);

    pixelateWhole(ctx1.canvas, ctx2, pixel);

    document.getElementById("download1").href =
        ctx1.canvas.toDataURL("image/png");

    document.getElementById("download2").href =
        ctx2.canvas.toDataURL("image/png");
}

updateLabels();
generateImages();
</script>

</body>
</html>
