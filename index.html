<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Oswald:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f2f2f2;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:10px;
}

/* компактний UI */
.controls{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    background:white;
    padding:10px;
    border-radius:10px;
}

.controls input,
.controls select{
    padding:8px;
    font-size:14px;
}

/* фотки поруч */
.images{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.images div{
    flex:1;
    background:white;
    padding:8px;
    border-radius:10px;
}

img{
    width:100%;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border:none;
    border-radius:8px;
    background:black;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="controls">
<input type="file" id="imageInput">

<input type="text" id="topText" placeholder="Верхній текст">
<input type="text" id="bottomText" placeholder="Нижній текст">

<select id="font">
<option>Arial</option>
<option>Impact</option>
<option>Montserrat</option>
<option>Oswald</option>
</select>

<input type="range" id="fontSize" min="40" max="140" value="90">

<input type="range" id="lines" min="1" max="3" value="2">

<select id="effect">
<option value="none">None</option>
<option value="pixel">Pixel</option>
<option value="blur">Blur</option>
</select>

<input type="range" id="effectStrength" min="2" max="30" value="8">
</div>

<div class="images">

<div>
<img id="img1">
<button onclick="downloadImage('img1')">Зберегти</button>
</div>

<div>
<img id="img2">
<button onclick="downloadImage('img2')">Зберегти</button>
</div>

</div>

</div>

<script>
let baseCanvas = document.createElement("canvas");
baseCanvas.width = 1080;
baseCanvas.height = 1080;
let ctx = baseCanvas.getContext("2d");

let img = null;
let timeout;

/* debounce щоб не лагало */
function update(){
    clearTimeout(timeout);
    timeout = setTimeout(render, 30);
}

document.getElementById("imageInput").onchange = e=>{
    const reader = new FileReader();
    reader.onload = ev=>{
        img = new Image();
        img.onload = render;
        img.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

document.querySelectorAll("input,select").forEach(el=>{
    el.oninput = update;
});

function wrap(ctx,text,maxLines){
    let words = text.split(" ");
    let lines = [""];
    
    words.forEach(word=>{
        let last = lines[lines.length-1];
        lines[lines.length-1] = last + " " + word;

        if(lines.length < maxLines && ctx.measureText(lines[lines.length-1]).width > 900){
            lines.push(word);
        }
    });

    return lines.slice(0,maxLines);
}

function render(){
    ctx.clearRect(0,0,1080,1080);

    ctx.fillStyle="white";
    ctx.fillRect(0,0,1080,1080);

    const font = document.getElementById("font").value;
    const size = document.getElementById("fontSize").value;

    ctx.font = `bold ${size}px ${font}`;
    ctx.textAlign="center";

    let lines = wrap(ctx,
        document.getElementById("topText").value.toUpperCase(),
        document.getElementById("lines").value
    );

    let y = 100;

    lines.forEach(line=>{
        ctx.fillStyle="black";
        ctx.fillText(line,540,y);
        y += size + 10;
    });

    if(img){
        ctx.drawImage(img,0,y,1080,1080-y);
    }

    const bottom = document.getElementById("bottomText").value.toUpperCase();

    if(bottom){
        ctx.font = `bold ${size-20}px ${font}`;
        ctx.fillText(bottom,540,1000);
    }

    document.getElementById("img1").src = baseCanvas.toDataURL();

    applyEffect();
}

function applyEffect(){
    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1080;

    const c = canvas.getContext("2d");

    const effect = document.getElementById("effect").value;
    const strength = document.getElementById("effectStrength").value;

    if(effect === "blur"){
        c.filter = `blur(${strength}px)`;
        c.drawImage(baseCanvas,0,0);
        c.filter = "none";
    } else {
        c.drawImage(baseCanvas,0,0);
    }

    if(effect === "pixel"){
        let temp = document.createElement("canvas");
        temp.width = canvas.width / strength;
        temp.height = canvas.height / strength;

        let t = temp.getContext("2d");
        t.drawImage(canvas,0,0,temp.width,temp.height);

        c.imageSmoothingEnabled = false;
        c.drawImage(temp,0,0,canvas.width,canvas.height);
    }

    document.getElementById("img2").src = canvas.toDataURL();
}

function downloadImage(id){
    const link = document.createElement("a");
    link.href = document.getElementById(id).src;
    link.download = "image.png";
    link.click();
}

render();
</script>

</body>
</html>
