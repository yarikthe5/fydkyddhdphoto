<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Editor TikTok Style</title>
<style>
body{
    font-family: Arial, sans-serif;
    max-width: 950px;
    margin: 20px auto;
    padding: 20px;
}
canvas{
    border: 1px solid #ccc;
    max-width: 100%;
    margin: 10px 0;
}
.controls{
    display: flex;
    flex-direction: column;
    gap: 12px;
}
input, button{
    padding: 10px;
    font-size: 16px;
}
a button{
    margin-bottom: 20px;
}
</style>
</head>
<body>

<h1>Генератор фото</h1>

<div class="controls">
    <input type="file" id="imageInput" accept="image/*">
    <input type="text" id="textInput" placeholder="Введи текст">

    <label>Ширина тексту (X): <span id="textWidthValue">1000</span></label>
    <input type="range" id="textWidth" min="300" max="1080" value="1000">

    <label>Розмір тексту (Y): <span id="fontSizeValue">110</span></label>
    <input type="range" id="fontSize" min="40" max="200" value="110">

    <label>Пікселізація: <span id="pixelValue">20</span></label>
    <input type="range" id="pixelSize" min="5" max="80" value="20">

    <button onclick="generateImages()">Згенерувати</button>
</div>

<br>

<h2>Перше фото</h2>
<canvas id="canvas1" width="1080" height="1080"></canvas>
<br>
<a id="download1" download="normal.png">
    <button>Скачати перше фото</button>
</a>

<h2>Піксельне фото</h2>
<canvas id="canvas2" width="1080" height="1080"></canvas>
<br>
<a id="download2" download="pixelated.png">
    <button>Скачати піксельне фото</button>
</a>

<script>
let uploadedImage = null;

document.getElementById("imageInput").addEventListener("change", e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = ev => {
        uploadedImage = new Image();
        uploadedImage.src = ev.target.result;
    };

    reader.readAsDataURL(file);
});

function updateSlider(sliderId, valueId){
    document.getElementById(sliderId).addEventListener("input", e=>{
        document.getElementById(valueId).textContent = e.target.value;
    });
}

updateSlider("textWidth", "textWidthValue");
updateSlider("fontSize", "fontSizeValue");
updateSlider("pixelSize", "pixelValue");

function wrapText(ctx, text, maxWidth){
    const words = text.toUpperCase().split(" ");
    let lines = [];
    let line = "";

    for(let word of words){
        let test = line + word + " ";

        if(ctx.measureText(test).width > maxWidth && line){
            lines.push(line.trim());
            line = word + " ";
        } else {
            line = test;
        }
    }

    lines.push(line.trim());

    if(lines.length > 2){
        lines = [lines[0], lines.slice(1).join(" ")];
    }

    return lines;
}

function drawNormal(ctx){
    const canvas = ctx.canvas;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const text = document.getElementById("textInput").value;
    const maxWidth = parseInt(document.getElementById("textWidth").value);
    const fontSize = parseInt(document.getElementById("fontSize").value);

    ctx.font = `bold ${fontSize}px Arial`;
    ctx.fillStyle = "black";
    ctx.textAlign = "center";

    const lines = wrapText(ctx, text, maxWidth);

    const lineHeight = fontSize + 10;
    const topHeight = lines.length * lineHeight + 60;

    lines.forEach((line, i)=>{
        ctx.fillText(
            line,
            canvas.width / 2,
            50 + fontSize + i * lineHeight
        );
    });

    if(uploadedImage){
        ctx.drawImage(
            uploadedImage,
            0,
            topHeight,
            canvas.width,
            canvas.height - topHeight
        );
    }
}

function pixelateWhole(sourceCanvas, targetCtx, size){
    const temp = document.createElement("canvas");

    temp.width = Math.floor(sourceCanvas.width / size);
    temp.height = Math.floor(sourceCanvas.height / size);

    const tctx = temp.getContext("2d");

    tctx.drawImage(
        sourceCanvas,
        0,
        0,
        temp.width,
        temp.height
    );

    targetCtx.clearRect(
        0,
        0,
        targetCtx.canvas.width,
        targetCtx.canvas.height
    );

    targetCtx.imageSmoothingEnabled = false;

    targetCtx.drawImage(
        temp,
        0,
        0,
        targetCtx.canvas.width,
        targetCtx.canvas.height
    );

    targetCtx.imageSmoothingEnabled = true;
}

function generateImages(){
    const ctx1 = document.getElementById("canvas1").getContext("2d");
    const ctx2 = document.getElementById("canvas2").getContext("2d");

    drawNormal(ctx1);

    const pixel = parseInt(
        document.getElementById("pixelSize").value
    );

    pixelateWhole(ctx1.canvas, ctx2, pixel);

    document.getElementById("download1").href =
        ctx1.canvas.toDataURL("image/png");

    document.getElementById("download2").href =
        ctx2.canvas.toDataURL("image/png");
}
</script>

</body>
</html>
